var sortCol = 0
var sortDir = -1
var filtered = DATA.slice()

function render() {
  var q = document.getElementById('q').value.toLowerCase()
  var yr = document.getElementById('yr').value
  filtered = DATA.filter(function(r) {
    var matchY = !yr || r[2] === yr
    var matchQ = !q || r[1].toLowerCase().indexOf(q) !== -1 || r[4].toLowerCase().indexOf(q) !== -1
    return matchY && matchQ
  })
  filtered.sort(function(a, b) {
    var av = a[sortCol], bv = b[sortCol]
    if (typeof av === 'number') return sortDir * (av - bv)
    return sortDir * String(av).localeCompare(String(bv))
  })
  var frag = document.createDocumentFragment()
  filtered.forEach(function(r) {
    var tr = document.createElement('tr')
    var url = 'https://js1k.com/' + r[3] + '/demo/' + r[0]
    tr.innerHTML =
      '<td class="num">' + r[0] + '</td>' +
      '<td><a href="' + url + '" target="_blank" rel="noopener">' + esc(r[1]) + '</a></td>' +
      '<td>' + r[2] + '</td>' +
      '<td class="desc">' + esc(r[4]) + '</td>'
    frag.appendChild(tr)
  })
  var tbody = document.getElementById('tbody')
  tbody.innerHTML = ''
  tbody.appendChild(frag)
  document.getElementById('count').textContent = filtered.length + ' entries'
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

document.getElementById('q').addEventListener('input', render)
document.getElementById('yr').addEventListener('change', render)

document.querySelectorAll('th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = parseInt(th.dataset.col)
    if (sortCol === col) {
      sortDir *= -1
    } else {
      sortCol = col
      sortDir = col === 0 ? -1 : 1
    }
    document.querySelectorAll('th[data-col]').forEach(function(t) {
      t.classList.remove('sorted-asc','sorted-desc')
    })
    th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc')
    render()
  })
})

render()
